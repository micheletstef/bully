<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>outputs</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        margin: 0;
        font-family: "Courier New", Courier, monospace;
        color: #1f1f1f;
        background: #fff;
      }

      .layout {
        display: grid;
        grid-template-columns: 320px 1fr;
        height: 100vh;
      }

      .sidebar {
        border-right: 1px solid #dedede;
        padding: 16px;
        overflow: auto;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 14px;
        text-transform: lowercase;
      }

      .hint {
        margin: 0 0 12px;
        color: #666;
        font-size: 11px;
      }

      .link-row {
        margin-bottom: 12px;
        font-size: 11px;
      }

      a {
        color: #1f1f1f;
      }

      .output-list {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .output-item {
        border: 1px solid #d6d6d6;
        padding: 8px;
      }

      .output-name {
        font-size: 12px;
        margin: 0 0 6px;
      }

      .output-meta {
        margin: 0 0 8px;
        color: #666;
        font-size: 10px;
      }

      .output-actions {
        display: flex;
        gap: 10px;
        font-size: 11px;
      }

      .action {
        border: 0;
        background: transparent;
        color: #1f1f1f;
        cursor: pointer;
        padding: 0;
        text-decoration: underline;
        font-family: inherit;
        font-size: inherit;
      }

      .preview {
        height: 100%;
      }

      #previewFrame {
        width: 100%;
        height: 100%;
        border: 0;
      }

      .empty {
        font-size: 11px;
        color: #666;
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <h1>outputs</h1>
        <p class="hint">Saved versions are frozen snapshots.</p>
        <div class="link-row"><a href="../index.html">back to editor</a></div>
        <div id="outputList" class="output-list"></div>
      </aside>
      <main class="preview">
        <iframe id="previewFrame" title="saved output preview"></iframe>
      </main>
    </div>

    <script>
      const outputList = document.getElementById("outputList");
      const previewFrame = document.getElementById("previewFrame");
      const EMPTY_HTML = "<!doctype html><html><body style='font-family:Courier New, monospace;padding:20px;color:#666;'>Choose a saved output.</body></html>";

      async function readOutputs() {
        try {
          const response = await fetch("/api/outputs", { cache: "no-store" });
          if (!response.ok) {
            return [];
          }
          const parsed = await response.json();
          return Array.isArray(parsed) ? parsed : [];
        } catch (error) {
          return [];
        }
      }

      async function deleteOutput(id) {
        const response = await fetch(`/api/outputs/${encodeURIComponent(id)}`, {
          method: "DELETE"
        });
        if (!response.ok) {
          throw new Error("Delete failed");
        }
      }

      function openSnapshot(snapshot) {
        previewFrame.srcdoc = snapshot.html || EMPTY_HTML;
      }

      async function removeSnapshot(id) {
        await deleteOutput(id);
        await renderList();
      }

      function openInNewTab(snapshot) {
        const html = snapshot.html || EMPTY_HTML;
        const blob = new Blob([html], { type: "text/html" });
        const url = URL.createObjectURL(blob);
        window.open(url, "_blank", "noopener,noreferrer");
      }

      async function renderList() {
        const outputs = await readOutputs();
        outputList.innerHTML = "";

        if (!outputs.length) {
          const empty = document.createElement("div");
          empty.className = "empty";
          empty.textContent = "No saved outputs yet.";
          outputList.appendChild(empty);
          previewFrame.srcdoc = EMPTY_HTML;
          return;
        }

        outputs.forEach((snapshot, index) => {
          const item = document.createElement("article");
          item.className = "output-item";

          const name = document.createElement("p");
          name.className = "output-name";
          name.textContent = snapshot.name || `output-${index + 1}`;
          item.appendChild(name);

          const meta = document.createElement("p");
          meta.className = "output-meta";
          const direction = snapshot.directionName ? ` | ${snapshot.directionName}` : "";
          meta.textContent = `${snapshot.createdAt || ""}${direction}`;
          item.appendChild(meta);

          const actions = document.createElement("div");
          actions.className = "output-actions";

          const previewButton = document.createElement("button");
          previewButton.type = "button";
          previewButton.className = "action";
          previewButton.textContent = "preview";
          previewButton.addEventListener("click", () => openSnapshot(snapshot));
          actions.appendChild(previewButton);

          const openButton = document.createElement("button");
          openButton.type = "button";
          openButton.className = "action";
          openButton.textContent = "open tab";
          openButton.addEventListener("click", () => openInNewTab(snapshot));
          actions.appendChild(openButton);

          const deleteButton = document.createElement("button");
          deleteButton.type = "button";
          deleteButton.className = "action";
          deleteButton.textContent = "delete";
          deleteButton.addEventListener("click", async () => {
            await removeSnapshot(snapshot.id);
          });
          actions.appendChild(deleteButton);

          item.appendChild(actions);
          outputList.appendChild(item);
        });

        openSnapshot(outputs[0]);
      }

      renderList();
    </script>
  </body>
</html>
