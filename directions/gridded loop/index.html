<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>gridded loop</title>
    <style>
      :root {
        --loop-duration: 16s;
      }

      html,
      body {
        height: 100%;
        margin: 0;
      }

      body,
      .canvas {
        background: #fff8a5;
      }

      .canvas {
        position: relative;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: "Courier New", Courier, monospace;
        color: #1f1f1f;
      }

      .loop-fill {
        position: absolute;
        inset: 0;
        background-image: url("../../assets/linear-loop-strip.png");
        background-repeat: repeat;
        background-size: auto 68px;
        animation: loop-x var(--loop-duration) linear infinite;
        opacity: 0.98;
      }

      @keyframes loop-x {
        from {
          background-position: 0 0;
        }
        to {
          background-position: 1024px 0;
        }
      }
    </style>
  </head>
  <body>
    <div class="canvas">
      <div class="loop-fill"></div>
    </div>
    <script>
      window.addEventListener("message", (event) => {
        const payload = event.data;
        if (!payload || payload.type !== "setLoopDuration") {
          return;
        }

        const seconds = Number(payload.seconds);
        if (!Number.isFinite(seconds) || seconds <= 0) {
          return;
        }

        document.documentElement.style.setProperty("--loop-duration", `${seconds}s`);
      });
    </script>
  </body>
</html>
