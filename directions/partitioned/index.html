<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>partitioned</title>
    <style>
      :root {
        --loop-duration: 16s;
        --loop-pad-tb: 0px;
        --loop-pad-lr: 0px;
        --loop-bg: #fff8a5;
        --loop-gap: 0px;
        --loop-row-gap: 0px;
      }

      html,
      body {
        height: 100%;
        margin: 0;
      }

      body,
      .canvas {
        background: var(--loop-bg);
      }

      .canvas {
        position: relative;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      .loop-stage {
        position: absolute;
        inset: 0;
        padding: var(--loop-pad-tb) 0;
      }

      .partition-grid {
        position: absolute;
        inset: var(--loop-pad-tb) 0;
        display: grid;
        grid-template-columns: 1820fr 1020fr 3060fr;
        overflow: hidden;
      }

      .partition {
        position: relative;
        overflow: hidden;
      }

      .partition:not(:last-child) {
        box-shadow: inset -1px 0 0 rgba(0, 0, 0, 0.14);
      }

      .loop-fill {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        gap: var(--loop-row-gap);
        padding: 0 var(--loop-pad-lr);
        overflow: hidden;
      }

      .loop-row {
        flex: 1 1 0;
        min-height: 0;
        overflow: hidden;
      }

      .loop-row-track {
        display: flex;
        gap: var(--loop-gap);
        width: max-content;
        height: 100%;
        animation: loop-x var(--loop-duration) linear infinite;
        animation-delay: var(--loop-row-delay, 0s);
        animation-direction: var(--loop-row-direction, normal);
      }

      @keyframes loop-x {
        from {
          transform: translateX(0);
        }
        to {
          transform: translateX(calc(-1 * var(--loop-distance)));
        }
      }

      .loop-artwork {
        height: 100%;
        width: auto;
        flex: 0 0 auto;
      }

      .loop-spacer {
        height: 100%;
        flex: 0 0 auto;
      }
    </style>
  </head>
  <body>
    <div class="canvas">
      <div id="loopStage" class="loop-stage">
        <div class="partition-grid">
          <section class="partition">
            <div id="partitionLeft" class="loop-fill"></div>
          </section>
          <section class="partition">
            <div id="partitionCurve" class="loop-fill"></div>
          </section>
          <section class="partition">
            <div id="partitionRight" class="loop-fill"></div>
          </section>
        </div>
      </div>
    </div>
    <script>
      const loopStage = document.getElementById("loopStage");
      const partitionContainers = {
        left: document.getElementById("partitionLeft"),
        curve: document.getElementById("partitionCurve"),
        right: document.getElementById("partitionRight")
      };
      const DEFAULT_SOURCE = "../../assets/linear-loop-strip.png";
      const PARTITION_KEYS = ["left", "curve", "right"];
      const state = {
        seconds: 16,
        artworksByPartition: {
          left: [DEFAULT_SOURCE],
          curve: [DEFAULT_SOURCE],
          right: [DEFAULT_SOURCE]
        },
        padTopBottom: 0,
        padLeftRight: 0,
        backgroundColor: "#fff8a5",
        assetGap: 0,
        rowCount: 1,
        rowOffset: 0,
        rowGap: 0,
        reverseOddRows: false
      };
      let playbackTimer = null;
      let primaryTrack = null;
      let primaryDistance = 1;

      function normalizeArtworkSource(path) {
        if (/^(https?:|data:|blob:)/.test(path)) {
          return path;
        }
        if (path.startsWith("../../") || path.startsWith("../")) {
          return path;
        }
        if (path.startsWith("assets/")) {
          return `../../${path}`;
        }
        return path;
      }

      function waitForImage(img) {
        return new Promise((resolve) => {
          if (img.complete) {
            resolve();
            return;
          }
          img.addEventListener("load", resolve, { once: true });
          img.addEventListener("error", resolve, { once: true });
        });
      }

      async function renderPartition(container, sources) {
        container.innerHTML = "";
        const rowCount = Math.max(1, Math.round(Number(state.rowCount) || 1));
        const sidePadding = Math.max(0, Number(state.padLeftRight) || 0);
        const rows = [];
        const allImages = [];
        let firstSequenceNodes = [];
        let firstSequenceStartNode = null;
        let secondSequenceStartNode = null;

        function appendSequence(track, collectNodes) {
          const nodes = [];
          let startNode = null;

          if (sidePadding > 0) {
            const spacerStart = document.createElement("div");
            spacerStart.className = "loop-spacer";
            spacerStart.style.width = `${sidePadding}px`;
            track.appendChild(spacerStart);
            nodes.push(spacerStart);
            startNode = spacerStart;
          }

          sources.forEach((src) => {
            const image = document.createElement("img");
            image.className = "loop-artwork";
            image.src = src;
            image.alt = "";
            track.appendChild(image);
            allImages.push(image);
            nodes.push(image);
            if (!startNode) {
              startNode = image;
            }
          });

          if (sidePadding > 0) {
            const spacerEnd = document.createElement("div");
            spacerEnd.className = "loop-spacer";
            spacerEnd.style.width = `${sidePadding}px`;
            track.appendChild(spacerEnd);
            nodes.push(spacerEnd);
          }

          if (collectNodes) {
            firstSequenceNodes = nodes;
            firstSequenceStartNode = startNode;
          }

          return startNode;
        }

        for (let rowIndex = 0; rowIndex < rowCount; rowIndex += 1) {
          const row = document.createElement("div");
          row.className = "loop-row";
          const track = document.createElement("div");
          track.className = "loop-row-track";
          row.appendChild(track);
          container.appendChild(row);
          rows.push(track);

          appendSequence(track, rowIndex === 0);
          const secondStart = appendSequence(track, false);
          if (rowIndex === 0) {
            secondSequenceStartNode = secondStart;
          }
        }

        await Promise.all(allImages.map(waitForImage));

        const gapWidth = Math.max(0, Number(state.assetGap) || 0);
        let loopDistance = 0;
        if (firstSequenceStartNode && secondSequenceStartNode) {
          const firstRect = firstSequenceStartNode.getBoundingClientRect();
          const secondRect = secondSequenceStartNode.getBoundingClientRect();
          loopDistance = secondRect.left - firstRect.left;
        }
        if (!Number.isFinite(loopDistance) || loopDistance <= 0) {
          loopDistance = firstSequenceNodes.reduce(
            (sum, node) => sum + node.getBoundingClientRect().width,
            0
          ) + Math.max(0, firstSequenceNodes.length - 1) * gapWidth;
        }
        const safeDistance = loopDistance > 0 ? loopDistance : 1;

        const offsetSecondsPerRow = ((Number(state.rowOffset) || 0) / safeDistance) * state.seconds;
        rows.forEach((track, rowIndex) => {
          const delay = -1 * offsetSecondsPerRow * rowIndex;
          track.style.setProperty("--loop-row-delay", `${delay}s`);
          track.style.setProperty("--loop-distance", `${safeDistance}px`);
          const reverse = !!state.reverseOddRows && rowIndex % 2 === 1;
          track.style.setProperty("--loop-row-direction", reverse ? "reverse" : "normal");
        });

        return {
          primaryTrack: rows[0] || null,
          loopDistance: safeDistance
        };
      }

      async function renderLoop() {
        document.documentElement.style.setProperty("--loop-duration", `${state.seconds}s`);
        document.documentElement.style.setProperty("--loop-pad-tb", `${state.padTopBottom}px`);
        document.documentElement.style.setProperty("--loop-pad-lr", `${state.padLeftRight}px`);
        document.documentElement.style.setProperty("--loop-bg", state.backgroundColor);
        document.documentElement.style.setProperty("--loop-gap", `${Math.max(0, Number(state.assetGap) || 0)}px`);
        document.documentElement.style.setProperty(
          "--loop-row-gap",
          `${Math.max(0, Number(state.rowGap) || 0)}px`
        );

        primaryTrack = null;
        primaryDistance = 1;

        for (const key of PARTITION_KEYS) {
          const container = partitionContainers[key];
          if (!container) {
            continue;
          }
          const sourceListRaw = state.artworksByPartition[key];
          const sourceList = Array.isArray(sourceListRaw) && sourceListRaw.length
            ? sourceListRaw
            : [DEFAULT_SOURCE];
          const normalizedSources = sourceList.map(normalizeArtworkSource);
          const result = await renderPartition(container, normalizedSources);
          if (!primaryTrack && result.primaryTrack) {
            primaryTrack = result.primaryTrack;
            primaryDistance = result.loopDistance;
          }
        }

        emitPlayback();
      }

      function emitPlayback() {
        const durationMs = Math.max(1, state.seconds * 1000);
        const animationSource = primaryTrack || partitionContainers.left;
        const animation = animationSource ? animationSource.getAnimations()[0] : null;
        let elapsedMs = 0;

        if (animation && Number.isFinite(animation.currentTime)) {
          const currentTime = Number(animation.currentTime);
          elapsedMs = ((currentTime % durationMs) + durationMs) % durationMs;
        } else {
          elapsedMs = performance.now() % durationMs;
        }

        const progress = elapsedMs / durationMs;
        const viewportWidth = loopStage ? loopStage.clientWidth : 0;
        const viewportRatio =
          primaryDistance > 0 ? Math.min(1, Math.max(0.01, viewportWidth / primaryDistance)) : 0.25;
        const stageHeight = loopStage ? loopStage.clientHeight : 0;

        window.parent.postMessage(
          {
            type: "loopPlayback",
            progress,
            viewportRatio,
            elapsedSeconds: elapsedMs / 1000,
            durationSeconds: durationMs / 1000,
            stageHeight,
            assetGap: state.assetGap,
            loopDistance: primaryDistance
          },
          "*"
        );
      }

      function startPlaybackEmitter() {
        if (playbackTimer) {
          clearInterval(playbackTimer);
        }
        emitPlayback();
        playbackTimer = setInterval(emitPlayback, 50);
      }

      function sanitizePartitionSources(input) {
        const output = { left: [], curve: [], right: [] };
        if (!input || typeof input !== "object") {
          return output;
        }
        PARTITION_KEYS.forEach((key) => {
          const values = Array.isArray(input[key]) ? input[key] : [];
          output[key] = values
            .map((item) => String(item).trim())
            .filter((item) => item.length > 0);
        });
        return output;
      }

      function applyConfig(payload) {
        const seconds = Number(payload.seconds);
        if (Number.isFinite(seconds) && seconds > 0) {
          state.seconds = seconds;
        }

        if (payload.artworksByPartition && typeof payload.artworksByPartition === "object") {
          const cleaned = sanitizePartitionSources(payload.artworksByPartition);
          PARTITION_KEYS.forEach((key) => {
            if (cleaned[key].length) {
              state.artworksByPartition[key] = cleaned[key];
            }
          });
        } else if (Array.isArray(payload.artworks)) {
          const cleaned = payload.artworks
            .map((item) => String(item).trim())
            .filter((item) => item.length > 0);
          if (cleaned.length) {
            state.artworksByPartition.left = [...cleaned];
            state.artworksByPartition.curve = [...cleaned];
            state.artworksByPartition.right = [...cleaned];
          }
        }

        const padTopBottom = Number(payload.padTopBottom);
        if (Number.isFinite(padTopBottom) && padTopBottom >= 0) {
          state.padTopBottom = padTopBottom;
        }

        const padLeftRight = Number(payload.padLeftRight);
        if (Number.isFinite(padLeftRight) && padLeftRight >= 0) {
          state.padLeftRight = padLeftRight;
        }

        if (typeof payload.backgroundColor === "string" && /^#[0-9a-f]{6}$/i.test(payload.backgroundColor)) {
          state.backgroundColor = payload.backgroundColor;
        }

        const assetGap = Number(payload.assetGap);
        if (Number.isFinite(assetGap) && assetGap >= 0) {
          state.assetGap = assetGap;
        }

        const rowCount = Number(payload.rowCount);
        if (Number.isFinite(rowCount) && rowCount >= 1) {
          state.rowCount = Math.round(rowCount);
        }

        const rowOffset = Number(payload.rowOffset);
        if (Number.isFinite(rowOffset) && rowOffset >= 0) {
          state.rowOffset = rowOffset;
        }

        const rowGap = Number(payload.rowGap);
        if (Number.isFinite(rowGap) && rowGap >= 0) {
          state.rowGap = rowGap;
        }

        state.reverseOddRows = !!payload.reverseOddRows;
        renderLoop();
      }

      window.addEventListener("message", (event) => {
        const payload = event.data;
        if (!payload) {
          return;
        }

        if (payload.type === "setLoopConfig") {
          applyConfig(payload);
          return;
        }

        if (payload.type === "setLoopDuration") {
          applyConfig({ seconds: payload.seconds });
        }
      });

      renderLoop();
      startPlaybackEmitter();
    </script>
  </body>
</html>
