<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>linear loop</title>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }

      body,
      .canvas {
        background: #fff8a5;
      }

      .canvas {
        position: relative;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: "Courier New", Courier, monospace;
        color: #1f1f1f;
      }

      .guide-vertical {
        position: absolute;
        top: 0;
        bottom: 0;
        width: 2px;
        background: rgba(17, 17, 17, 0.42);
      }

      .x-1820 {
        left: 30.8475%;
      }

      .x-2840 {
        left: 48.1356%;
      }
    </style>
  </head>
  <body>
    <div class="canvas">
      <div class="guide-vertical x-1820"></div>
      <div class="guide-vertical x-2840"></div>
    </div>
  </body>
</html>
