<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>loop maker</title>
    <style>
      :root {
        color-scheme: light dark;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        font-family: "Courier New", Courier, monospace;
      }

      body {
        background: #111;
        color: #f5f5f5;
      }

      .tool {
        display: grid;
        grid-template-columns: minmax(280px, 340px) minmax(0, 1fr);
        gap: 12px;
        width: 100%;
        height: 100%;
        padding: 12px;
      }

      .panel {
        border: 1px solid rgba(255, 255, 255, 0.25);
        padding: 10px;
        overflow: auto;
        background: rgba(0, 0, 0, 0.2);
      }

      .panel h1 {
        margin: 0 0 10px;
        font-size: 14px;
        text-transform: lowercase;
        font-weight: 400;
      }

      .controls {
        display: grid;
        gap: 10px;
      }

      .row {
        display: grid;
        gap: 6px;
      }

      .row label {
        font-size: 11px;
        opacity: 0.9;
        text-transform: lowercase;
      }

      input[type="file"],
      input[type="range"],
      button {
        width: 100%;
        font-family: inherit;
        font-size: 11px;
      }

      .visually-hidden {
        position: absolute;
        width: 1px;
        height: 1px;
        margin: -1px;
        padding: 0;
        border: 0;
        clip: rect(0 0 0 0);
        overflow: hidden;
      }

      .drop-zone {
        display: grid;
        place-items: center;
        min-height: 108px;
        border: 1px dashed rgba(255, 255, 255, 0.5);
        padding: 10px;
        font-size: 11px;
        text-align: center;
        cursor: pointer;
        user-select: none;
      }

      .drop-zone.drag-over {
        border-style: solid;
        background: rgba(255, 255, 255, 0.07);
      }

      button {
        border: 1px solid rgba(255, 255, 255, 0.5);
        background: transparent;
        color: inherit;
        padding: 5px 8px;
        text-transform: lowercase;
        cursor: pointer;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.5;
      }

      .fps-line {
        display: grid;
        grid-template-columns: 1fr auto;
        align-items: center;
        gap: 8px;
      }

      .hint {
        margin: 0;
        font-size: 11px;
        opacity: 0.8;
      }

      .timing {
        font-size: 11px;
        opacity: 0.85;
      }

      .crop-grid {
        display: grid;
        gap: 6px;
      }

      .crop-overlay {
        position: absolute;
        inset: 14px;
        pointer-events: none;
        display: none;
      }

      .crop-box {
        position: absolute;
        border: 2px solid rgba(255, 64, 64, 0.95);
        background: rgba(255, 64, 64, 0.12);
        pointer-events: auto;
        cursor: move;
      }

      .crop-handle {
        position: absolute;
        width: 10px;
        height: 10px;
        border: 1px solid #fff;
        background: #ff4747;
      }

      .crop-handle[data-handle="nw"] {
        left: -6px;
        top: -6px;
        cursor: nwse-resize;
      }

      .crop-handle[data-handle="ne"] {
        right: -6px;
        top: -6px;
        cursor: nesw-resize;
      }

      .crop-handle[data-handle="sw"] {
        left: -6px;
        bottom: -6px;
        cursor: nesw-resize;
      }

      .crop-handle[data-handle="se"] {
        right: -6px;
        bottom: -6px;
        cursor: nwse-resize;
      }

      .crop-handle[data-handle="n"] {
        top: -6px;
        left: 50%;
        transform: translateX(-50%);
        cursor: ns-resize;
      }

      .crop-handle[data-handle="s"] {
        bottom: -6px;
        left: 50%;
        transform: translateX(-50%);
        cursor: ns-resize;
      }

      .crop-handle[data-handle="w"] {
        left: -6px;
        top: 50%;
        transform: translateY(-50%);
        cursor: ew-resize;
      }

      .crop-handle[data-handle="e"] {
        right: -6px;
        top: 50%;
        transform: translateY(-50%);
        cursor: ew-resize;
      }

      .list {
        display: grid;
        gap: 6px;
        margin-top: 6px;
      }

      .item {
        display: grid;
        grid-template-columns: 36px 1fr auto auto;
        align-items: center;
        gap: 6px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        padding: 4px;
      }

      .item img {
        width: 36px;
        height: 24px;
        object-fit: cover;
        border: 1px solid rgba(255, 255, 255, 0.2);
      }

      .item-name {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-size: 11px;
      }

      .mini {
        width: auto;
        min-width: 26px;
        padding: 3px 6px;
      }

      .preview-wrap {
        border: 1px solid rgba(255, 255, 255, 0.25);
        display: grid;
        place-items: center;
        min-width: 0;
        min-height: 0;
        background: repeating-conic-gradient(#1b1b1b 0% 25%, #141414 0% 50%) 50% / 16px 16px;
      }

      .preview-inner {
        width: 100%;
        height: 100%;
        display: grid;
        place-items: center;
        padding: 14px;
        position: relative;
      }

      .preview-image {
        max-width: 100%;
        max-height: 100%;
        object-fit: contain;
        image-rendering: auto;
      }

      .preview-canvas {
        max-width: 100%;
        max-height: 100%;
        width: 100%;
        height: 100%;
        display: block;
      }

      .empty {
        text-align: center;
        font-size: 12px;
        opacity: 0.75;
      }

      .status {
        margin-top: 8px;
        min-height: 16px;
        font-size: 11px;
        opacity: 0.9;
      }

      @media (max-width: 920px) {
        .tool {
          grid-template-columns: 1fr;
          grid-template-rows: auto minmax(0, 1fr);
        }
      }
    </style>
  </head>
  <body>
    <main class="tool">
      <section class="panel">
        <h1>loop maker</h1>
        <div class="controls">
          <div class="row">
            <label for="frameInput">upload frames (png/jpg/webp/gif)</label>
            <label id="dropZone" class="drop-zone" for="frameInput">
              drop image sequence here<br />or click to browse
            </label>
            <input id="frameInput" class="visually-hidden" type="file" accept="image/*" multiple />
          </div>

          <div class="row">
            <label>frame rate</label>
            <div class="fps-line">
              <input id="fpsInput" type="range" min="1" max="30" step="1" value="8" />
              <span id="fpsValue">8 fps</span>
            </div>
          </div>

          <div class="row">
            <label>playback speed</label>
            <div class="fps-line">
              <input id="speedInput" type="range" min="0.25" max="20" step="0.25" value="1" />
              <span id="speedValue">1.00x</span>
            </div>
            <div id="timingValue" class="timing">effective: 8.00 fps (125 ms/frame)</div>
          </div>

          <div class="row">
            <label>frame sampling</label>
            <div class="fps-line">
              <input id="frameStepInput" type="range" min="1" max="12" step="1" value="1" />
              <span id="frameStepValue">every frame</span>
            </div>
          </div>

          <div class="row">
            <label for="autoCenterInput">content centering</label>
            <div class="fps-line">
              <input id="autoCenterInput" type="checkbox" />
              <span id="autoCenterValue">off</span>
            </div>
            <div class="timing">detects visible pixel bounds and centers per frame</div>
          </div>

          <div class="row">
            <label>crop (percent)</label>
            <div class="crop-grid">
              <div class="fps-line">
                <input id="cropTopInput" type="range" min="0" max="45" step="0.1" value="0" />
                <span id="cropTopValue">top 0%</span>
              </div>
              <div class="fps-line">
                <input id="cropRightInput" type="range" min="0" max="45" step="0.1" value="0" />
                <span id="cropRightValue">right 0%</span>
              </div>
              <div class="fps-line">
                <input id="cropBottomInput" type="range" min="0" max="45" step="0.1" value="0" />
                <span id="cropBottomValue">bottom 0%</span>
              </div>
              <div class="fps-line">
                <input id="cropLeftInput" type="range" min="0" max="45" step="0.1" value="0" />
                <span id="cropLeftValue">left 0%</span>
              </div>
            </div>
          </div>

          <div class="row">
            <button id="playPauseButton" type="button" disabled>pause</button>
          </div>

          <div class="row">
            <button id="exportButton" type="button" disabled>export gif</button>
            <p class="hint">exports in current frame order</p>
          </div>

          <div class="row">
            <button id="clearButton" type="button" disabled>clear frames</button>
          </div>
        </div>

        <div id="frameList" class="list"></div>
        <div id="status" class="status"></div>
      </section>

      <section class="preview-wrap">
        <div class="preview-inner">
          <canvas id="previewCanvas" class="preview-canvas" style="display: none"></canvas>
          <div id="cropOverlay" class="crop-overlay">
            <div id="cropBox" class="crop-box" data-handle="move">
              <span class="crop-handle" data-handle="nw"></span>
              <span class="crop-handle" data-handle="n"></span>
              <span class="crop-handle" data-handle="ne"></span>
              <span class="crop-handle" data-handle="e"></span>
              <span class="crop-handle" data-handle="se"></span>
              <span class="crop-handle" data-handle="s"></span>
              <span class="crop-handle" data-handle="sw"></span>
              <span class="crop-handle" data-handle="w"></span>
            </div>
          </div>
          <div id="emptyState" class="empty">add multiple images to preview your loop</div>
        </div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/gif.js.optimized@1.0.1/dist/gif.js"></script>
    <script>
      const frameInput = document.getElementById("frameInput");
      const fpsInput = document.getElementById("fpsInput");
      const fpsValue = document.getElementById("fpsValue");
      const speedInput = document.getElementById("speedInput");
      const speedValue = document.getElementById("speedValue");
      const timingValue = document.getElementById("timingValue");
      const frameStepInput = document.getElementById("frameStepInput");
      const frameStepValue = document.getElementById("frameStepValue");
      const autoCenterInput = document.getElementById("autoCenterInput");
      const autoCenterValue = document.getElementById("autoCenterValue");
      const cropTopInput = document.getElementById("cropTopInput");
      const cropRightInput = document.getElementById("cropRightInput");
      const cropBottomInput = document.getElementById("cropBottomInput");
      const cropLeftInput = document.getElementById("cropLeftInput");
      const cropTopValue = document.getElementById("cropTopValue");
      const cropRightValue = document.getElementById("cropRightValue");
      const cropBottomValue = document.getElementById("cropBottomValue");
      const cropLeftValue = document.getElementById("cropLeftValue");
      const playPauseButton = document.getElementById("playPauseButton");
      const exportButton = document.getElementById("exportButton");
      const clearButton = document.getElementById("clearButton");
      const dropZone = document.getElementById("dropZone");
      const frameList = document.getElementById("frameList");
      const previewCanvas = document.getElementById("previewCanvas");
      const cropOverlay = document.getElementById("cropOverlay");
      const cropBox = document.getElementById("cropBox");
      const emptyState = document.getElementById("emptyState");
      const status = document.getElementById("status");

      const state = {
        frames: [],
        currentIndex: 0,
        fps: 8,
        speedMultiplier: 1,
        frameStep: 1,
        autoCenterContent: false,
        cropTop: 0,
        cropRight: 0,
        cropBottom: 0,
        cropLeft: 0,
        playing: true,
        timer: null
      };
      let previewRenderToken = 0;
      let previewFrameMetrics = null;
      let cropDragState = null;
      let boundsCanvas = null;
      let boundsContext = null;

      function setStatus(message) {
        status.textContent = String(message || "");
      }

      function clearStatus() {
        setStatus("");
      }

      function frameDelayMs() {
        const effectiveFps = Math.max(0.01, state.fps * state.speedMultiplier);
        return Math.max(1, Math.round(1000 / effectiveFps));
      }

      function steppedFrames() {
        const step = Math.max(1, Math.round(Number(state.frameStep) || 1));
        const result = state.frames.filter((_, index) => index % step === 0);
        return result.length ? result : state.frames.slice(0, 1);
      }

      function getBoundsContext(width, height) {
        const safeWidth = Math.max(1, Math.round(width));
        const safeHeight = Math.max(1, Math.round(height));
        if (!boundsCanvas) {
          boundsCanvas = document.createElement("canvas");
        }
        if (boundsCanvas.width !== safeWidth || boundsCanvas.height !== safeHeight) {
          boundsCanvas.width = safeWidth;
          boundsCanvas.height = safeHeight;
        }
        if (!boundsContext) {
          boundsContext = boundsCanvas.getContext("2d", { willReadFrequently: true });
        }
        return boundsContext;
      }

      function contentBoundsCacheKey(cropRect) {
        return `${cropRect.sx}:${cropRect.sy}:${cropRect.sw}:${cropRect.sh}`;
      }

      function detectFrameContentBounds(frame, image, cropRect) {
        if (!frame || !image || !cropRect) {
          return {
            cx: cropRect ? cropRect.sw * 0.5 : 0,
            cy: cropRect ? cropRect.sh * 0.5 : 0
          };
        }
        if (!frame.boundsCache || typeof frame.boundsCache !== "object") {
          frame.boundsCache = Object.create(null);
        }
        const cacheKey = contentBoundsCacheKey(cropRect);
        const cached = frame.boundsCache[cacheKey];
        if (cached) {
          return cached;
        }
        const context = getBoundsContext(cropRect.sw, cropRect.sh);
        if (!context) {
          const fallback = { cx: cropRect.sw * 0.5, cy: cropRect.sh * 0.5 };
          frame.boundsCache[cacheKey] = fallback;
          return fallback;
        }
        context.clearRect(0, 0, cropRect.sw, cropRect.sh);
        context.drawImage(image, cropRect.sx, cropRect.sy, cropRect.sw, cropRect.sh, 0, 0, cropRect.sw, cropRect.sh);
        const imageData = context.getImageData(0, 0, cropRect.sw, cropRect.sh).data;
        let minX = cropRect.sw;
        let minY = cropRect.sh;
        let maxX = -1;
        let maxY = -1;
        const alphaThreshold = 8;
        for (let index = 3; index < imageData.length; index += 4) {
          const alpha = imageData[index];
          if (alpha <= alphaThreshold) {
            continue;
          }
          const pixelIndex = (index - 3) / 4;
          const x = pixelIndex % cropRect.sw;
          const y = Math.floor(pixelIndex / cropRect.sw);
          if (x < minX) {
            minX = x;
          }
          if (y < minY) {
            minY = y;
          }
          if (x > maxX) {
            maxX = x;
          }
          if (y > maxY) {
            maxY = y;
          }
        }
        const bounds = maxX < 0 || maxY < 0
          ? { cx: cropRect.sw * 0.5, cy: cropRect.sh * 0.5 }
          : {
              cx: (minX + maxX + 1) * 0.5,
              cy: (minY + maxY + 1) * 0.5
            };
        frame.boundsCache[cacheKey] = bounds;
        return bounds;
      }

      function autoCenterShiftPx(frame, image, cropRect, destWidth, destHeight) {
        if (!state.autoCenterContent) {
          return { x: 0, y: 0 };
        }
        const bounds = detectFrameContentBounds(frame, image, cropRect);
        const centerX = cropRect.sw * 0.5;
        const centerY = cropRect.sh * 0.5;
        const offsetSourceX = centerX - bounds.cx;
        const offsetSourceY = centerY - bounds.cy;
        const scaleX = destWidth / Math.max(1, cropRect.sw);
        const scaleY = destHeight / Math.max(1, cropRect.sh);
        return {
          x: offsetSourceX * scaleX,
          y: offsetSourceY * scaleY
        };
      }

      function updateButtons() {
        const hasFrames = state.frames.length > 0;
        playPauseButton.disabled = !hasFrames;
        exportButton.disabled = !hasFrames;
        clearButton.disabled = !hasFrames;
      }

      function getEffectiveCropRatios() {
        let top = Math.max(0, Math.min(0.45, state.cropTop / 100));
        let right = Math.max(0, Math.min(0.45, state.cropRight / 100));
        let bottom = Math.max(0, Math.min(0.45, state.cropBottom / 100));
        let left = Math.max(0, Math.min(0.45, state.cropLeft / 100));
        const verticalTotal = top + bottom;
        const horizontalTotal = left + right;
        if (verticalTotal >= 0.95) {
          const scale = 0.95 / verticalTotal;
          top *= scale;
          bottom *= scale;
        }
        if (horizontalTotal >= 0.95) {
          const scale = 0.95 / horizontalTotal;
          left *= scale;
          right *= scale;
        }
        return { top, right, bottom, left };
      }

      function setCropFromRatios(ratios) {
        state.cropTop = Math.max(0, Math.min(45, ratios.top * 100));
        state.cropRight = Math.max(0, Math.min(45, ratios.right * 100));
        state.cropBottom = Math.max(0, Math.min(45, ratios.bottom * 100));
        state.cropLeft = Math.max(0, Math.min(45, ratios.left * 100));
      }

      function syncCropInputsFromState() {
        cropTopInput.value = String(state.cropTop);
        cropRightInput.value = String(state.cropRight);
        cropBottomInput.value = String(state.cropBottom);
        cropLeftInput.value = String(state.cropLeft);
      }

      function cropRectForImage(image) {
        const sourceWidth = Math.max(1, image.naturalWidth || image.width || 1);
        const sourceHeight = Math.max(1, image.naturalHeight || image.height || 1);
        const crop = getEffectiveCropRatios();
        const sx = Math.max(0, Math.min(sourceWidth - 1, Math.round(sourceWidth * crop.left)));
        const sy = Math.max(0, Math.min(sourceHeight - 1, Math.round(sourceHeight * crop.top)));
        const rightPx = Math.max(0, Math.min(sourceWidth - 1, Math.round(sourceWidth * crop.right)));
        const bottomPx = Math.max(0, Math.min(sourceHeight - 1, Math.round(sourceHeight * crop.bottom)));
        const sw = Math.max(1, sourceWidth - sx - rightPx);
        const sh = Math.max(1, sourceHeight - sy - bottomPx);
        return { sx, sy, sw, sh };
      }

      function ensurePreviewCanvasSize() {
        const dpr = Math.max(1, window.devicePixelRatio || 1);
        const rect = previewCanvas.getBoundingClientRect();
        const cssWidth = Math.max(1, rect.width);
        const cssHeight = Math.max(1, rect.height);
        const width = Math.max(1, Math.round(cssWidth * dpr));
        const height = Math.max(1, Math.round(cssHeight * dpr));
        if (previewCanvas.width !== width || previewCanvas.height !== height) {
          previewCanvas.width = width;
          previewCanvas.height = height;
        }
        return { cssWidth, cssHeight, dpr };
      }

      function drawPreviewFrame(frame, image) {
        const context = previewCanvas.getContext("2d", { willReadFrequently: true });
        if (!context) {
          return;
        }
        const { cssWidth, cssHeight, dpr } = ensurePreviewCanvasSize();
        context.setTransform(dpr, 0, 0, dpr, 0, 0);
        context.clearRect(0, 0, cssWidth, cssHeight);
        const cropRect = cropRectForImage(image);
        const sourceAspect = cropRect.sw / cropRect.sh;
        const destAspect = cssWidth / cssHeight;
        let dw = cssWidth;
        let dh = cssHeight;
        if (sourceAspect > destAspect) {
          dh = cssWidth / sourceAspect;
        } else {
          dw = cssHeight * sourceAspect;
        }
        const dx = (cssWidth - dw) * 0.5;
        const dy = (cssHeight - dh) * 0.5;
        const offset = autoCenterShiftPx(frame, image, cropRect, dw, dh);
        context.imageSmoothingEnabled = true;
        context.drawImage(
          image,
          cropRect.sx,
          cropRect.sy,
          cropRect.sw,
          cropRect.sh,
          dx + offset.x,
          dy + offset.y,
          dw,
          dh
        );
        previewFrameMetrics = {
          imageWidth: Math.max(1, image.naturalWidth || image.width || 1),
          imageHeight: Math.max(1, image.naturalHeight || image.height || 1),
          drawX: dx,
          drawY: dy,
          drawWidth: dw,
          drawHeight: dh
        };
        syncCropOverlay();
      }

      function syncCropOverlay() {
        if (!previewFrameMetrics || !state.frames.length) {
          cropOverlay.style.display = "none";
          return;
        }
        const crop = getEffectiveCropRatios();
        const x = previewFrameMetrics.drawX + previewFrameMetrics.drawWidth * crop.left;
        const y = previewFrameMetrics.drawY + previewFrameMetrics.drawHeight * crop.top;
        const width = previewFrameMetrics.drawWidth * Math.max(0.01, 1 - crop.left - crop.right);
        const height = previewFrameMetrics.drawHeight * Math.max(0.01, 1 - crop.top - crop.bottom);
        cropBox.style.left = `${x}px`;
        cropBox.style.top = `${y}px`;
        cropBox.style.width = `${width}px`;
        cropBox.style.height = `${height}px`;
        cropOverlay.style.display = "block";
      }

      async function ensureFrameImage(frame) {
        if (!frame) {
          return null;
        }
        if (frame.image) {
          return frame.image;
        }
        frame.image = await loadImage(frame.file);
        return frame.image;
      }

      async function updatePreview() {
        if (!state.frames.length) {
          previewCanvas.style.display = "none";
          emptyState.style.display = "block";
          return;
        }
        const token = ++previewRenderToken;
        const frames = steppedFrames();
        if (state.currentIndex >= frames.length) {
          state.currentIndex = 0;
        }
        const frame = frames[state.currentIndex] || frames[0];
        const image = await ensureFrameImage(frame);
        if (token !== previewRenderToken || !image) {
          return;
        }
        previewCanvas.style.display = "block";
        drawPreviewFrame(frame, image);
        emptyState.style.display = "none";
      }

      function renderFrameList() {
        frameList.innerHTML = "";
        state.frames.forEach((frame, index) => {
          const item = document.createElement("div");
          item.className = "item";

          const thumb = document.createElement("img");
          thumb.src = frame.url;
          thumb.alt = "";
          item.appendChild(thumb);

          const name = document.createElement("div");
          name.className = "item-name";
          name.textContent = `${index + 1}. ${frame.name}`;
          item.appendChild(name);

          const upButton = document.createElement("button");
          upButton.type = "button";
          upButton.className = "mini";
          upButton.textContent = "↑";
          upButton.title = "move up";
          upButton.disabled = index === 0;
          upButton.addEventListener("click", () => moveFrame(index, index - 1));
          item.appendChild(upButton);

          const downButton = document.createElement("button");
          downButton.type = "button";
          downButton.className = "mini";
          downButton.textContent = "↓";
          downButton.title = "move down";
          downButton.disabled = index === state.frames.length - 1;
          downButton.addEventListener("click", () => moveFrame(index, index + 1));
          item.appendChild(downButton);

          frameList.appendChild(item);
        });
      }

      function showCurrentFrameImmediately() {
        if (state.currentIndex >= state.frames.length) {
          state.currentIndex = 0;
        }
        updatePreview();
      }

      function stopPlayback() {
        if (state.timer) {
          clearInterval(state.timer);
          state.timer = null;
        }
      }

      function startPlayback() {
        stopPlayback();
        if (!state.playing || state.frames.length < 2) {
          syncCropOverlay();
          return;
        }
        const frames = steppedFrames();
        if (frames.length < 2) {
          syncCropOverlay();
          return;
        }
        state.timer = setInterval(() => {
          const activeFrames = steppedFrames();
          if (!activeFrames.length) {
            return;
          }
          state.currentIndex = (state.currentIndex + 1) % activeFrames.length;
          updatePreview();
        }, frameDelayMs());
      }

      function syncPlaybackButton() {
        playPauseButton.textContent = state.playing ? "pause" : "play";
      }

      function syncFpsReadout() {
        fpsValue.textContent = `${state.fps} fps`;
      }

      function syncSpeedReadout() {
        speedValue.textContent = `${state.speedMultiplier.toFixed(2)}x`;
      }

      function syncTimingReadout() {
        const effectiveFps = Math.max(0.01, state.fps * state.speedMultiplier);
        timingValue.textContent = `effective: ${effectiveFps.toFixed(2)} fps (${frameDelayMs()} ms/frame)`;
      }

      function syncFrameStepReadout() {
        const step = Math.max(1, Math.round(state.frameStep));
        frameStepValue.textContent = step <= 1 ? "every frame" : `every ${step} frames`;
      }

      function syncAutoCenterReadout() {
        autoCenterValue.textContent = state.autoCenterContent ? "on" : "off";
      }

      function syncCropReadout() {
        cropTopValue.textContent = `top ${state.cropTop}%`;
        cropRightValue.textContent = `right ${state.cropRight}%`;
        cropBottomValue.textContent = `bottom ${state.cropBottom}%`;
        cropLeftValue.textContent = `left ${state.cropLeft}%`;
      }

      function restartPlayback() {
        showCurrentFrameImmediately();
        startPlayback();
      }

      function updateAllReadouts() {
        syncFpsReadout();
        syncSpeedReadout();
        syncTimingReadout();
        syncFrameStepReadout();
        syncAutoCenterReadout();
        syncCropReadout();
      }

      function moveFrame(fromIndex, toIndex) {
        if (
          fromIndex < 0 ||
          fromIndex >= state.frames.length ||
          toIndex < 0 ||
          toIndex >= state.frames.length ||
          fromIndex === toIndex
        ) {
          return;
        }
        const [moved] = state.frames.splice(fromIndex, 1);
        state.frames.splice(toIndex, 0, moved);
        state.currentIndex = Math.max(0, Math.min(state.currentIndex, state.frames.length - 1));
        renderFrameList();
        restartPlayback();
      }

      function clearFrames() {
        state.frames.forEach((frame) => {
          if (frame && frame.url) {
            URL.revokeObjectURL(frame.url);
          }
        });
        state.frames = [];
        state.currentIndex = 0;
        previewFrameMetrics = null;
        stopPlayback();
        renderFrameList();
        updatePreview();
        updateButtons();
        syncCropOverlay();
      }

      async function addFrames(files) {
        const list = Array.from(files || []).filter((file) => file.type.startsWith("image/"));
        if (!list.length) {
          setStatus("no supported image files found");
          return;
        }
        clearStatus();
        list.forEach((file) => {
          state.frames.push({
            name: file.name || "frame",
            file,
            url: URL.createObjectURL(file),
            image: null,
            boundsCache: Object.create(null)
          });
        });
        state.currentIndex = 0;
        renderFrameList();
        updateButtons();
        updatePreview();
        startPlayback();
      }

      function loadImage(file) {
        return new Promise((resolve, reject) => {
          const objectUrl = URL.createObjectURL(file);
          const image = new Image();
          image.onload = () => {
            URL.revokeObjectURL(objectUrl);
            resolve(image);
          };
          image.onerror = () => {
            URL.revokeObjectURL(objectUrl);
            reject(new Error("image load failed"));
          };
          image.src = objectUrl;
        });
      }

      async function exportGif() {
        if (!state.frames.length) {
          return;
        }
        if (typeof GIF !== "function") {
          setStatus("gif encoder failed to load");
          return;
        }
        exportButton.disabled = true;
        setStatus("rendering gif...");
        try {
          const frames = steppedFrames();
          const loadedImages = await Promise.all(frames.map((frame) => loadImage(frame.file)));
          const firstImage = loadedImages[0];
          const baseCropRect = cropRectForImage(firstImage);
          const width = Math.max(1, baseCropRect.sw);
          const height = Math.max(1, baseCropRect.sh);
          const canvas = document.createElement("canvas");
          canvas.width = width;
          canvas.height = height;
          const context = canvas.getContext("2d", { willReadFrequently: true });
          if (!context) {
            throw new Error("canvas unsupported");
          }

          const gif = new GIF({
            workers: 2,
            quality: 8,
            width,
            height,
            workerScript: "https://cdn.jsdelivr.net/npm/gif.js.optimized@1.0.1/dist/gif.worker.js"
          });

          loadedImages.forEach((image, index) => {
            const frame = frames[index];
            const cropRect = cropRectForImage(image);
            const offset = autoCenterShiftPx(frame, image, cropRect, width, height);
            context.clearRect(0, 0, width, height);
            context.drawImage(
              image,
              cropRect.sx,
              cropRect.sy,
              cropRect.sw,
              cropRect.sh,
              offset.x,
              offset.y,
              width,
              height
            );
            gif.addFrame(context, { copy: true, delay: frameDelayMs() });
          });

          const blob = await new Promise((resolve, reject) => {
            gif.on("finished", resolve);
            gif.on("abort", () => reject(new Error("render aborted")));
            gif.render();
          });

          const outputUrl = URL.createObjectURL(blob);
          const anchor = document.createElement("a");
          anchor.href = outputUrl;
          anchor.download = "loop-maker.gif";
          anchor.click();
          URL.revokeObjectURL(outputUrl);
          setStatus("gif exported");
        } catch (error) {
          setStatus("unable to export gif");
        } finally {
          exportButton.disabled = state.frames.length === 0;
        }
      }

      frameInput.addEventListener("change", async () => {
        await addFrames(frameInput.files);
        frameInput.value = "";
      });

      function bindDropTarget(target) {
        ["dragenter", "dragover"].forEach((eventName) => {
          target.addEventListener(eventName, (event) => {
            event.preventDefault();
            event.stopPropagation();
            dropZone.classList.add("drag-over");
          });
        });

        ["dragleave", "dragend", "drop"].forEach((eventName) => {
          target.addEventListener(eventName, (event) => {
            event.preventDefault();
            event.stopPropagation();
            if (eventName === "drop") {
              const files = event.dataTransfer ? event.dataTransfer.files : null;
              addFrames(files);
            }
            dropZone.classList.remove("drag-over");
          });
        });
      }

      bindDropTarget(dropZone);
      bindDropTarget(document.body);

      window.addEventListener("dragover", (event) => {
        event.preventDefault();
      });

      window.addEventListener("drop", (event) => {
        event.preventDefault();
      });

      fpsInput.addEventListener("input", () => {
        const nextFps = Math.max(1, Math.min(30, Number(fpsInput.value) || 8));
        state.fps = nextFps;
        updateAllReadouts();
        restartPlayback();
      });

      speedInput.addEventListener("input", () => {
        const nextSpeed = Math.max(0.25, Math.min(20, Number(speedInput.value) || 1));
        state.speedMultiplier = nextSpeed;
        updateAllReadouts();
        restartPlayback();
      });

      frameStepInput.addEventListener("input", () => {
        state.frameStep = Math.max(1, Math.min(12, Math.round(Number(frameStepInput.value) || 1)));
        state.currentIndex = 0;
        updateAllReadouts();
        restartPlayback();
      });

      autoCenterInput.addEventListener("change", () => {
        state.autoCenterContent = Boolean(autoCenterInput.checked);
        updateAllReadouts();
        updatePreview();
      });

      [cropTopInput, cropRightInput, cropBottomInput, cropLeftInput].forEach((input) => {
        input.addEventListener("input", () => {
          state.cropTop = Math.max(0, Math.min(45, Number(cropTopInput.value) || 0));
          state.cropRight = Math.max(0, Math.min(45, Number(cropRightInput.value) || 0));
          state.cropBottom = Math.max(0, Math.min(45, Number(cropBottomInput.value) || 0));
          state.cropLeft = Math.max(0, Math.min(45, Number(cropLeftInput.value) || 0));
          updateAllReadouts();
          updatePreview();
        });
      });

      function startCropDrag(event) {
        event.preventDefault();
        event.stopPropagation();
        if (!previewFrameMetrics || !state.frames.length) {
          return;
        }
        const handleTarget = event.target && event.target.dataset ? event.target.dataset.handle : "";
        const handle = handleTarget || (event.currentTarget && event.currentTarget.dataset ? event.currentTarget.dataset.handle : "move");
        cropDragState = {
          handle: handle || "move",
          startX: event.clientX,
          startY: event.clientY,
          startCrop: getEffectiveCropRatios()
        };
        window.addEventListener("pointermove", onCropDragMove);
        window.addEventListener("pointerup", endCropDrag);
      }

      function endCropDrag() {
        cropDragState = null;
        window.removeEventListener("pointermove", onCropDragMove);
        window.removeEventListener("pointerup", endCropDrag);
      }

      function onCropDragMove(event) {
        if (!cropDragState || !previewFrameMetrics) {
          return;
        }
        const minSize = 0.02;
        const deltaX = (event.clientX - cropDragState.startX) / Math.max(1, previewFrameMetrics.drawWidth);
        const deltaY = (event.clientY - cropDragState.startY) / Math.max(1, previewFrameMetrics.drawHeight);
        const next = { ...cropDragState.startCrop };
        const handle = cropDragState.handle;
        if (handle === "move") {
          const width = 1 - cropDragState.startCrop.left - cropDragState.startCrop.right;
          const height = 1 - cropDragState.startCrop.top - cropDragState.startCrop.bottom;
          const left = Math.max(0, Math.min(1 - width, cropDragState.startCrop.left + deltaX));
          const top = Math.max(0, Math.min(1 - height, cropDragState.startCrop.top + deltaY));
          next.left = left;
          next.right = 1 - left - width;
          next.top = top;
          next.bottom = 1 - top - height;
        } else {
          if (handle.includes("w")) {
            next.left = Math.max(0, Math.min(1 - minSize - next.right, cropDragState.startCrop.left + deltaX));
          }
          if (handle.includes("e")) {
            next.right = Math.max(0, Math.min(1 - minSize - next.left, cropDragState.startCrop.right - deltaX));
          }
          if (handle.includes("n")) {
            next.top = Math.max(0, Math.min(1 - minSize - next.bottom, cropDragState.startCrop.top + deltaY));
          }
          if (handle.includes("s")) {
            next.bottom = Math.max(0, Math.min(1 - minSize - next.top, cropDragState.startCrop.bottom - deltaY));
          }
        }
        setCropFromRatios(next);
        syncCropInputsFromState();
        updateAllReadouts();
        updatePreview();
      }

      cropBox.addEventListener("pointerdown", startCropDrag);
      [...cropBox.querySelectorAll(".crop-handle")].forEach((handle) => {
        handle.addEventListener("pointerdown", startCropDrag);
      });

      playPauseButton.addEventListener("click", () => {
        state.playing = !state.playing;
        syncPlaybackButton();
        startPlayback();
      });

      exportButton.addEventListener("click", async () => {
        await exportGif();
      });

      clearButton.addEventListener("click", () => {
        clearFrames();
        clearStatus();
      });

      window.addEventListener("beforeunload", () => {
        clearFrames();
      });

      window.addEventListener("resize", () => {
        updatePreview();
      });

      syncPlaybackButton();
      syncCropInputsFromState();
      autoCenterInput.checked = state.autoCenterContent;
      updateAllReadouts();
      updateButtons();
      updatePreview();
    </script>
  </body>
</html>
