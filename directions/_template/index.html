<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Direction Template</title>
    <style>
      html, body {
        height: 100%;
        margin: 0;
      }
      body {
        display: grid;
        place-items: center;
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: linear-gradient(120deg, #111827, #1f2937, #334155);
        background-size: 200% 200%;
        animation: shift 8s ease-in-out infinite;
        color: #f9fafb;
      }
      main {
        text-align: center;
      }
      h1 {
        margin: 0 0 10px;
        font-size: clamp(20px, 2vw, 38px);
      }
      p {
        margin: 0;
        opacity: 0.85;
      }
      @keyframes shift {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }
    </style>
  </head>
  <body>
    <main>
      <h1 id="title">Direction</h1>
      <p>Starter direction canvas</p>
    </main>
    <script>
      const params = new URLSearchParams(window.location.search);
      const title = params.get("title") || "Direction";
      document.getElementById("title").textContent = title;
      document.title = title;
    </script>
  </body>
</html>
