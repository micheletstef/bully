<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Visual Editor</title>
    <style>
      :root {
        color-scheme: light;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #ffffff;
      }

      .visual-editor-block {
        width: 280px;
        height: 280px;
        background: #ff00ff;
      }
    </style>
  </head>
  <body>
    <div class="visual-editor-block" aria-label="Visual editor placeholder"></div>
  </body>
</html>
