<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Visual Editor</title>
    <style>
      :root {
        color-scheme: light;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100%;
        display: flex;
        align-items: flex-start;
        justify-content: center;
        padding: 18px;
        background: #fff;
        font-family: "Courier New", Courier, monospace;
        font-size: 12px;
        line-height: 1.25;
        color: #1f1f1f;
      }

      .page-shell {
        width: 100%;
        display: grid;
        grid-template-columns: 260px 220px 1fr;
        gap: 24px;
        align-items: start;
      }

      .assets-directory,
      .settings-panel {
        position: sticky;
        top: 18px;
        padding: 0;
        background: transparent;
      }

      .assets-title,
      .settings-title {
        margin: 0 0 6px;
        font-size: 12px;
        font-weight: 400;
        text-transform: lowercase;
      }

      .assets-list {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .asset-button {
        width: 100%;
        text-align: left;
        border: 0;
        background: transparent;
        color: #1f1f1f;
        padding: 2px 0;
        cursor: pointer;
        font-family: "Courier New", Courier, monospace;
        font-size: 12px;
        line-height: 1.25;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .asset-button::before {
        content: "[ ] ";
      }

      .asset-button.active::before {
        content: "[•] ";
      }

      .asset-button:hover,
      .asset-button:focus {
        text-decoration: underline;
        outline: none;
      }

      .settings-row {
        display: grid;
        grid-template-columns: 72px 1fr;
        align-items: center;
        gap: 8px;
      }

      .settings-label {
        text-transform: lowercase;
      }

      .alignment-toggle {
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }

      .alignment-button {
        border: 0;
        background: transparent;
        color: #1f1f1f;
        padding: 0;
        cursor: pointer;
        font-family: "Courier New", Courier, monospace;
        font-size: 12px;
        line-height: 1.25;
      }

      .alignment-button.inactive {
        color: #5d5d5d;
        text-decoration: line-through;
      }

      .alignment-button:hover,
      .alignment-button:focus {
        text-decoration: underline;
        outline: none;
      }

      .editor-stage {
        overflow: auto;
      }

      .visual-editor-block {
        width: max-content;
        min-width: 800px;
        height: 200px;
        background: #ff00ff;
        display: inline-flex;
        flex-wrap: nowrap;
        align-items: flex-start;
        gap: 8px;
        padding: 10px;
      }

      .fake-asset-block {
        flex: 0 0 auto;
        background: #1e6cff;
        border: 1px solid #0e4fc7;
      }
    </style>
  </head>
  <body>
    <div class="page-shell">
      <aside class="assets-directory" aria-label="Placeholder assets directory">
        <h2 class="assets-title">assets directory</h2>
        <div id="assetsList" class="assets-list"></div>
      </aside>
      <aside class="settings-panel" aria-label="Visual editor settings">
        <h2 class="settings-title">settings</h2>
        <div class="settings-row">
          <span class="settings-label">alignment</span>
          <div id="alignmentSettings" class="alignment-toggle" role="radiogroup" aria-label="Asset vertical alignment">
            <button type="button" class="alignment-button" data-align="top" role="radio" aria-checked="true">top</button>
            <span>/</span>
            <button type="button" class="alignment-button inactive" data-align="center" role="radio" aria-checked="false">center</button>
            <span>/</span>
            <button type="button" class="alignment-button inactive" data-align="bottom" role="radio" aria-checked="false">bottom</button>
          </div>
        </div>
      </aside>
      <main class="editor-stage">
        <div id="visualEditorBlock" class="visual-editor-block" aria-label="Visual editor placeholder"></div>
      </main>
    </div>
    <script>
      const fakeAssets = [
        { name: "hero-banner.psd", width: 160, height: 48 },
        { name: "logo-alt.png", width: 110, height: 70 },
        { name: "product-shot.jpg", width: 90, height: 90 },
        { name: "tagline.svg", width: 210, height: 36 },
        { name: "cta-button.ai", width: 130, height: 52 },
      ];

      const assetsList = document.getElementById("assetsList");
      const alignmentSettings = document.getElementById("alignmentSettings");
      const visualEditorBlock = document.getElementById("visualEditorBlock");
      const alignmentMap = {
        top: "flex-start",
        center: "center",
        bottom: "flex-end",
      };

      for (const asset of fakeAssets) {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "asset-button";
        button.textContent = asset.name + " (" + asset.width + "x" + asset.height + ")";
        button.addEventListener("click", () => {
          const activeButton = assetsList.querySelector(".asset-button.active");
          if (activeButton) {
            activeButton.classList.remove("active");
          }
          button.classList.add("active");

          const block = document.createElement("div");
          block.className = "fake-asset-block";
          block.style.width = asset.width + "px";
          block.style.height = asset.height + "px";
          visualEditorBlock.appendChild(block);
        });
        assetsList.appendChild(button);
      }

      alignmentSettings.addEventListener("click", (event) => {
        const target = event.target;
        if (!(target instanceof HTMLButtonElement)) {
          return;
        }
        const alignKey = target.dataset.align;
        if (!alignKey || !alignmentMap[alignKey]) {
          return;
        }

        const buttons = alignmentSettings.querySelectorAll(".alignment-button");
        for (const button of buttons) {
          const isSelected = button === target;
          button.classList.toggle("inactive", !isSelected);
          button.setAttribute("aria-checked", isSelected ? "true" : "false");
        }
        visualEditorBlock.style.alignItems = alignmentMap[alignKey];
      });
    </script>
  </body>
</html>
