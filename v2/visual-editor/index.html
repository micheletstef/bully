<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Visual Editor</title>
    <style>
      :root {
        color-scheme: light;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100%;
        display: flex;
        align-items: flex-start;
        justify-content: center;
        padding: 18px;
        background: #fff;
        font-family: "Courier New", Courier, monospace;
        font-size: 12px;
        line-height: 1.25;
        color: #1f1f1f;
      }

      .page-shell {
        width: 100%;
        display: grid;
        grid-template-columns: 260px 1fr;
        gap: 24px;
        align-items: start;
      }

      .assets-directory {
        position: sticky;
        top: 18px;
        padding: 0;
        background: transparent;
      }

      .assets-title {
        margin: 0 0 6px;
        font-size: 12px;
        font-weight: 400;
        text-transform: lowercase;
      }

      .assets-list {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .asset-button {
        width: 100%;
        text-align: left;
        border: 0;
        background: transparent;
        color: #1f1f1f;
        padding: 2px 0;
        cursor: pointer;
        font-family: "Courier New", Courier, monospace;
        font-size: 12px;
        line-height: 1.25;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .asset-button::before {
        content: "[ ] ";
      }

      .asset-button.active::before {
        content: "[•] ";
      }

      .asset-button:hover,
      .asset-button:focus {
        text-decoration: underline;
        outline: none;
      }

      .editor-stage {
        overflow: auto;
      }

      .visual-editor-block {
        width: max-content;
        min-width: 800px;
        height: 200px;
        background: #ff00ff;
        display: inline-flex;
        flex-wrap: nowrap;
        align-items: flex-start;
        gap: 8px;
        padding: 10px;
      }

      .fake-asset-block {
        flex: 0 0 auto;
        background: #1e6cff;
        border: 1px solid #0e4fc7;
      }
    </style>
  </head>
  <body>
    <div class="page-shell">
      <aside class="assets-directory" aria-label="Placeholder assets directory">
        <h2 class="assets-title">assets directory</h2>
        <div id="assetsList" class="assets-list"></div>
      </aside>
      <main class="editor-stage">
        <div id="visualEditorBlock" class="visual-editor-block" aria-label="Visual editor placeholder"></div>
      </main>
    </div>
    <script>
      const fakeAssets = [
        { name: "hero-banner.psd", width: 160, height: 48 },
        { name: "logo-alt.png", width: 110, height: 70 },
        { name: "product-shot.jpg", width: 90, height: 90 },
        { name: "tagline.svg", width: 210, height: 36 },
        { name: "cta-button.ai", width: 130, height: 52 },
      ];

      const assetsList = document.getElementById("assetsList");
      const visualEditorBlock = document.getElementById("visualEditorBlock");

      for (const asset of fakeAssets) {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "asset-button";
        button.textContent = asset.name + " (" + asset.width + "x" + asset.height + ")";
        button.addEventListener("click", () => {
          const activeButton = assetsList.querySelector(".asset-button.active");
          if (activeButton) {
            activeButton.classList.remove("active");
          }
          button.classList.add("active");

          const block = document.createElement("div");
          block.className = "fake-asset-block";
          block.style.width = asset.width + "px";
          block.style.height = asset.height + "px";
          visualEditorBlock.appendChild(block);
        });
        assetsList.appendChild(button);
      }
    </script>
  </body>
</html>
