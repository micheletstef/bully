<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Visual Editor</title>
    <style>
      :root {
        color-scheme: light;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100%;
        display: flex;
        align-items: flex-start;
        justify-content: center;
        padding: 18px;
        background: #fff;
        font-family: "Courier New", Courier, monospace;
        font-size: 12px;
        line-height: 1.25;
        color: #1f1f1f;
      }

      .page-shell {
        width: 100%;
        display: grid;
        grid-template-columns: 260px 220px 1fr;
        gap: 24px;
        align-items: start;
      }

      .assets-directory,
      .settings-panel {
        position: sticky;
        top: 18px;
        padding: 0;
        background: transparent;
      }

      .assets-title,
      .settings-title {
        margin: 0 0 6px;
        font-size: 12px;
        font-weight: 400;
        text-transform: lowercase;
      }

      .assets-list {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .asset-button {
        width: 100%;
        text-align: left;
        border: 0;
        background: transparent;
        color: #1f1f1f;
        padding: 2px 0;
        cursor: pointer;
        font-family: "Courier New", Courier, monospace;
        font-size: 12px;
        line-height: 1.25;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .asset-button::before {
        content: "[ ] ";
      }

      .asset-button.active::before {
        content: "[•] ";
      }

      .asset-button:hover,
      .asset-button:focus {
        text-decoration: underline;
        outline: none;
      }

      .settings-row {
        display: grid;
        grid-template-columns: 72px 1fr;
        align-items: center;
        gap: 8px;
        margin-bottom: 3px;
      }

      .settings-label {
        text-transform: lowercase;
      }

      .alignment-toggle {
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }

      .alignment-button {
        border: 0;
        background: transparent;
        color: #1f1f1f;
        padding: 0;
        cursor: pointer;
        font-family: "Courier New", Courier, monospace;
        font-size: 12px;
        line-height: 1.25;
      }

      .alignment-button.inactive {
        color: #5d5d5d;
        text-decoration: line-through;
      }

      .alignment-button:hover,
      .alignment-button:focus {
        text-decoration: underline;
        outline: none;
      }

      .settings-input {
        width: 100%;
        border: 1px solid #b3b3b3;
        padding: 1px 4px;
        font-family: "Courier New", Courier, monospace;
        font-size: 12px;
        line-height: 1.25;
      }

      .settings-color-input {
        width: 100%;
        height: 18px;
        border: 1px solid #b3b3b3;
        padding: 0;
        background: #fff;
      }

      .editor-stage {
        overflow: auto;
      }

      .visual-editor-block {
        --editor-bg: #ff00ff;
        --asset-color: #1e6cff;
        --safe-guide-color: #00ffff;
        --safe-top: 0px;
        --safe-bottom: 0px;
        --safe-left: 0px;
        --safe-right: 0px;
        width: max-content;
        min-width: 800px;
        height: 200px;
        background-color: var(--editor-bg);
        background-image:
          linear-gradient(var(--safe-guide-color), var(--safe-guide-color)),
          linear-gradient(var(--safe-guide-color), var(--safe-guide-color)),
          linear-gradient(var(--safe-guide-color), var(--safe-guide-color)),
          linear-gradient(var(--safe-guide-color), var(--safe-guide-color));
        background-size:
          1px 100%,
          1px 100%,
          100% 1px,
          100% 1px;
        background-repeat: no-repeat;
        background-position:
          var(--safe-left) 0,
          calc(100% - var(--safe-right)) 0,
          0 var(--safe-top),
          0 calc(100% - var(--safe-bottom));
        display: inline-flex;
        flex-wrap: nowrap;
        align-items: flex-start;
        gap: 8px;
        padding-top: var(--safe-top);
        padding-bottom: var(--safe-bottom);
        padding-left: var(--safe-left);
        padding-right: var(--safe-right);
      }

      .fake-asset-block {
        flex: 0 0 auto;
        background: var(--asset-color);
        border: 1px solid rgba(0, 0, 0, 0.22);
      }
    </style>
  </head>
  <body>
    <div class="page-shell">
      <aside class="assets-directory" aria-label="Placeholder assets directory">
        <h2 class="assets-title">assets directory</h2>
        <div id="assetsList" class="assets-list"></div>
      </aside>
      <aside class="settings-panel" aria-label="Visual editor settings">
        <h2 class="settings-title">settings</h2>
        <div class="settings-row">
          <span class="settings-label">alignment</span>
          <div id="alignmentSettings" class="alignment-toggle" role="radiogroup" aria-label="Asset vertical alignment">
            <button type="button" class="alignment-button" data-align="top" role="radio" aria-checked="true">top</button>
            <span>/</span>
            <button type="button" class="alignment-button inactive" data-align="center" role="radio" aria-checked="false">center</button>
            <span>/</span>
            <button type="button" class="alignment-button inactive" data-align="bottom" role="radio" aria-checked="false">bottom</button>
          </div>
        </div>
        <div class="settings-row">
          <label class="settings-label" for="paddingTBControl">padding tb</label>
          <input id="paddingTBControl" class="settings-input" type="number" min="0" max="4000" step="1" value="0" />
        </div>
        <div class="settings-row">
          <label class="settings-label" for="paddingLRControl">padding lr</label>
          <input id="paddingLRControl" class="settings-input" type="number" min="0" max="4000" step="1" value="0" />
        </div>
        <div class="settings-row">
          <label class="settings-label" for="backgroundColorControl">bg color</label>
          <input id="backgroundColorControl" class="settings-color-input" type="color" value="#ff00ff" />
        </div>
        <div class="settings-row">
          <label class="settings-label" for="assetColorControl">asset color</label>
          <input id="assetColorControl" class="settings-color-input" type="color" value="#1e6cff" />
        </div>
      </aside>
      <main class="editor-stage">
        <div id="visualEditorBlock" class="visual-editor-block" aria-label="Visual editor placeholder"></div>
      </main>
    </div>
    <script>
      const STORAGE_KEY = "v2VisualEditorState";
      const fakeAssets = [
        { name: "hero-banner.psd", width: 160, height: 48 },
        { name: "logo-alt.png", width: 110, height: 70 },
        { name: "product-shot.jpg", width: 90, height: 90 },
        { name: "tagline.svg", width: 210, height: 36 },
        { name: "cta-button.ai", width: 130, height: 52 },
      ];

      const assetsList = document.getElementById("assetsList");
      const alignmentSettings = document.getElementById("alignmentSettings");
      const visualEditorBlock = document.getElementById("visualEditorBlock");
      const paddingTBControl = document.getElementById("paddingTBControl");
      const paddingLRControl = document.getElementById("paddingLRControl");
      const backgroundColorControl = document.getElementById("backgroundColorControl");
      const assetColorControl = document.getElementById("assetColorControl");
      const alignmentMap = {
        top: "flex-start",
        center: "center",
        bottom: "flex-end",
      };

      function loadEditorState() {
        const defaultState = {
          assets: [],
          settings: {
            verticalAlignment: "top",
            paddingTB: 0,
            paddingLR: 0,
            backgroundColor: "#ff00ff",
            assetColor: "#1e6cff",
          },
        };
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) {
            return defaultState;
          }
          const parsed = JSON.parse(raw);
          const parsedAssets = Array.isArray(parsed.assets) ? parsed.assets : [];
          const sanitizedAssets = parsedAssets
            .filter((asset) => asset && typeof asset === "object")
            .map((asset) => ({
              name: typeof asset.name === "string" ? asset.name : "asset",
              width: Number.isFinite(asset.width) ? asset.width : 100,
              height: Number.isFinite(asset.height) ? asset.height : 60,
            }))
            .filter((asset) => asset.width > 0 && asset.height > 0);
          const savedAlignment = parsed?.settings?.verticalAlignment;
          const verticalAlignment = alignmentMap[savedAlignment] ? savedAlignment : "top";
          const savedPaddingTB = Number(parsed?.settings?.paddingTB);
          const savedPaddingLR = Number(parsed?.settings?.paddingLR);
          const paddingTB = Number.isFinite(savedPaddingTB) ? Math.max(0, savedPaddingTB) : 0;
          const paddingLR = Number.isFinite(savedPaddingLR) ? Math.max(0, savedPaddingLR) : 0;
          const savedBackgroundColor = typeof parsed?.settings?.backgroundColor === "string" ? parsed.settings.backgroundColor : "#ff00ff";
          const savedAssetColor = typeof parsed?.settings?.assetColor === "string" ? parsed.settings.assetColor : "#1e6cff";
          return {
            assets: sanitizedAssets,
            settings: {
              verticalAlignment,
              paddingTB,
              paddingLR,
              backgroundColor: savedBackgroundColor,
              assetColor: savedAssetColor,
            },
          };
        } catch (error) {
          return defaultState;
        }
      }

      function saveEditorState() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(editorState));
      }

      function appendAssetBlock(asset) {
        const block = document.createElement("div");
        block.className = "fake-asset-block";
        block.dataset.originalWidth = String(asset.width);
        block.dataset.originalHeight = String(asset.height);
        updateAssetBlockSize(block);
        visualEditorBlock.appendChild(block);
      }

      function getSafeAssetHeight() {
        const safeHeight = 200 - editorState.settings.paddingTB * 2;
        return Math.max(1, safeHeight);
      }

      function updateAssetBlockSize(block) {
        const originalWidth = Number(block.dataset.originalWidth);
        const originalHeight = Number(block.dataset.originalHeight);
        if (!Number.isFinite(originalWidth) || !Number.isFinite(originalHeight) || originalWidth <= 0 || originalHeight <= 0) {
          return;
        }
        const safeHeight = getSafeAssetHeight();
        const scaledWidth = Math.max(1, Math.round((originalWidth / originalHeight) * safeHeight));
        block.style.width = scaledWidth + "px";
        block.style.height = safeHeight + "px";
      }

      function updateAllAssetBlockSizes() {
        const blocks = visualEditorBlock.querySelectorAll(".fake-asset-block");
        for (const block of blocks) {
          updateAssetBlockSize(block);
        }
      }

      function setVerticalAlignment(alignKey, shouldPersist) {
        if (!alignmentMap[alignKey]) {
          return;
        }
        const buttons = alignmentSettings.querySelectorAll(".alignment-button");
        for (const button of buttons) {
          const isSelected = button.dataset.align === alignKey;
          button.classList.toggle("inactive", !isSelected);
          button.setAttribute("aria-checked", isSelected ? "true" : "false");
        }
        visualEditorBlock.style.alignItems = alignmentMap[alignKey];
        editorState.settings.verticalAlignment = alignKey;
        if (shouldPersist) {
          saveEditorState();
        }
      }

      function applyPaddingGuides(paddingTB, paddingLR, shouldPersist) {
        const normalizedTB = Math.max(0, Number(paddingTB) || 0);
        const normalizedLR = Math.max(0, Number(paddingLR) || 0);
        visualEditorBlock.style.setProperty("--safe-top", normalizedTB + "px");
        visualEditorBlock.style.setProperty("--safe-bottom", normalizedTB + "px");
        visualEditorBlock.style.setProperty("--safe-left", normalizedLR + "px");
        visualEditorBlock.style.setProperty("--safe-right", normalizedLR + "px");
        paddingTBControl.value = String(normalizedTB);
        paddingLRControl.value = String(normalizedLR);
        editorState.settings.paddingTB = normalizedTB;
        editorState.settings.paddingLR = normalizedLR;
        updateAllAssetBlockSizes();
        if (shouldPersist) {
          saveEditorState();
        }
      }

      function applyColors(backgroundColor, assetColor, shouldPersist) {
        visualEditorBlock.style.setProperty("--editor-bg", backgroundColor);
        visualEditorBlock.style.setProperty("--asset-color", assetColor);
        backgroundColorControl.value = backgroundColor;
        assetColorControl.value = assetColor;
        editorState.settings.backgroundColor = backgroundColor;
        editorState.settings.assetColor = assetColor;
        if (shouldPersist) {
          saveEditorState();
        }
      }

      const editorState = loadEditorState();

      for (const asset of fakeAssets) {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "asset-button";
        button.textContent = asset.name + " (" + asset.width + "x" + asset.height + ")";
        button.addEventListener("click", () => {
          const activeButton = assetsList.querySelector(".asset-button.active");
          if (activeButton) {
            activeButton.classList.remove("active");
          }
          button.classList.add("active");

          const assetSnapshot = {
            name: asset.name,
            width: asset.width,
            height: asset.height,
          };
          editorState.assets.push(assetSnapshot);
          appendAssetBlock(assetSnapshot);
          saveEditorState();
        });
        assetsList.appendChild(button);
      }

      alignmentSettings.addEventListener("click", (event) => {
        const target = event.target;
        if (!(target instanceof HTMLButtonElement)) {
          return;
        }
        const alignKey = target.dataset.align;
        if (!alignKey || !alignmentMap[alignKey]) {
          return;
        }
        setVerticalAlignment(alignKey, true);
      });

      paddingTBControl.addEventListener("input", () => {
        applyPaddingGuides(paddingTBControl.value, paddingLRControl.value, true);
      });

      paddingLRControl.addEventListener("input", () => {
        applyPaddingGuides(paddingTBControl.value, paddingLRControl.value, true);
      });

      backgroundColorControl.addEventListener("input", () => {
        applyColors(backgroundColorControl.value, assetColorControl.value, true);
      });

      assetColorControl.addEventListener("input", () => {
        applyColors(backgroundColorControl.value, assetColorControl.value, true);
      });

      setVerticalAlignment(editorState.settings.verticalAlignment, false);
      applyPaddingGuides(editorState.settings.paddingTB, editorState.settings.paddingLR, false);
      applyColors(editorState.settings.backgroundColor, editorState.settings.assetColor, false);
      for (const savedAsset of editorState.assets) {
        appendAssetBlock(savedAsset);
      }
    </script>
  </body>
</html>
