<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bully Versions</title>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        font-family: "Courier New", Courier, monospace;
        background: #fff;
        color: #111;
      }
      body {
        display: grid;
        place-items: center;
      }
      main {
        width: min(560px, 92vw);
        border: 1px solid #111;
        padding: 18px;
      }
      h1 {
        margin: 0 0 10px;
        font-size: 16px;
        font-weight: 400;
      }
      p {
        margin: 0 0 12px;
        font-size: 12px;
      }
      ul {
        margin: 0;
        padding-left: 20px;
      }
      li {
        margin: 6px 0;
        font-size: 12px;
      }
      a {
        color: #111;
      }
    </style>
  </head>
  <body>
    <main aria-label="Version selector">
      <h1>bully</h1>
      <p>Select a version:</p>
      <ul>
        <li><a href="./v1/">v1</a></li>
        <li><a href="./v2/">v2</a></li>
      </ul>
    </main>
  </body>
</html>
