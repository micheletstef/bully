<!doctype html>
<html lang="en">
  <head>

    <title>Billboard Direction Portal</title>
    <link rel="stylesheet" href="assets/css/placeholder.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div id="directoryPanel" class="directory-panel"></div>

      </main>
    </div>
    <script src="assets/js/placeholder.js"></script>
